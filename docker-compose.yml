# =============================================================================
# CareCircle — docker-compose.yml
#
# 🧠 HEALTH CHECK STRATEGY
# Docker's depends_on with condition: service_healthy ensures the app container
# doesn't start until Postgres, Redis, and RabbitMQ pass their health checks.
# Without this, Spring Boot starts, tries to connect to Postgres before it's
# ready to accept connections, and crashes with "Connection refused".
#
# Each health check uses the service's own CLI tool — the most reliable signal
# that the service is actually ready to accept traffic (not just "running").
#
# Usage:
#   cp .env.example .env          # fill in your secrets
#   docker compose up --build     # first run (builds the Spring Boot image)
#   docker compose up             # subsequent runs (uses cached image)
#   docker compose down -v        # stop + delete volumes (fresh DB)
# =============================================================================

services:

  # ── PostgreSQL 17 ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: carecircle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-carecircle_db}
      POSTGRES_USER:     ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      # Named volume: data persists across `docker compose down` (but not down -v)
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # pg_isready checks that Postgres is accepting TCP connections.
      # -U and -d ensure it's the right DB, not just the daemon socket.
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME:-carecircle_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s   # Grace period before first check — PG init takes time

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: carecircle-redis
    restart: unless-stopped
    # 🧠 requirepass sets the Redis password via CLI flag, matching
    # the REDIS_PASSWORD env var read by the Spring Boot app.
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      # redis-cli ping returns "PONG" when Redis is ready.
      # -a passes the password so AUTH doesn't fail the health check.
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── RabbitMQ 3 (with Management UI) ─────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: carecircle-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"    # AMQP (Spring Boot connects here)
      - "15672:15672"  # Management UI → http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      # rabbitmq-diagnostics check_port_connectivity is the official
      # lightweight readiness probe — faster than rabbitmqctl status.
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s  # RabbitMQ is the slowest to boot — give it time

  # ── Spring Boot App ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: carecircle-app
    restart: unless-stopped
    # 🧠 env_file loads all variables from .env into the container environment.
    # application-prod.yml reads them via ${VAR_NAME} Spring placeholders.
    env_file: .env
    environment:
      # Activate the prod profile — loads application-prod.yml on top of application.yaml
      SPRING_PROFILES_ACTIVE: prod
      # Override DB URL to point at the Docker service name, not localhost
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-carecircle_db}
      # Redis host override — 'redis' is the service name Docker DNS resolves
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # RabbitMQ host override
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      # Spring Actuator /actuator/health returns 200 when the app is UP.
      # wget is available in Alpine; curl is not (keeps image tiny).
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # Spring Boot + Flyway migrations need time on first boot

# ── Named Volumes ──────────────────────────────────────────────────────────────
# Named volumes persist data between container restarts.
# `docker compose down` keeps them. `docker compose down -v` removes them.
volumes:
  postgres_data:
  redis_data:
  rabbitmq_data: